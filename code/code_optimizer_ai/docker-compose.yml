name: velox-optimization-engine

x-app-env: &app-env
  APP_NAME: ${APP_NAME:-Velox Optimization Engine}
  APP_VERSION: ${APP_VERSION:-1.0.0}
  ENVIRONMENT: ${ENVIRONMENT:-production}
  DEBUG: ${DEBUG:-false}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  ENABLE_API_DOCS: ${ENABLE_API_DOCS:-false}
  FEATURE_EVOLUTIONARY_SEARCH: ${FEATURE_EVOLUTIONARY_SEARCH:-true}
  REQUIRE_AUTH_TOKEN: ${REQUIRE_AUTH_TOKEN:-true}
  API_AUTH_TOKEN: ${API_AUTH_TOKEN:-change-me}
  SECRET_KEY: ${SECRET_KEY:-change-me}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
  FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-127.0.0.1}
  REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-code_optimizer_ai}
  DB_HOST: ${DB_HOST:-postgres}
  DB_PORT: ${DB_PORT:-5432}
  DB_USER: ${DB_USER:-postgres}
  DB_PASSWORD: ${DB_PASSWORD:-password}
  DB_NAME: ${DB_NAME:-code_optimizer}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/11}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
  OPENROUTER_PRIMARY_MODEL: ${OPENROUTER_PRIMARY_MODEL:-qwen/qwen3-coder:free}
  OPENROUTER_SECONDARY_MODEL: ${OPENROUTER_SECONDARY_MODEL:-deepseek/deepseek-r1-0528:free}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
  OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

x-api-common: &api-common
  build:
    context: .
    dockerfile: Dockerfile
    target: production
  command: ["python", "-m", "code.code_optimizer_ai.run"]
  environment: *app-env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  volumes:
    - app_data:/app/data
    - app_models:/app/models
    - app_logs:/app/logs
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
    interval: 30s
    timeout: 5s
    retries: 5
  restart: unless-stopped
  networks:
    - backend

services:
  api:
    <<: *api-common

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${DB_NAME:-code_optimizer}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - backend

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - backend

volumes:
  app_data:
  app_models:
  app_logs:
  postgres_data:
  redis_data:

networks:
  backend:
    driver: bridge
