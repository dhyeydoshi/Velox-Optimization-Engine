services:
  api:
    build:
      target: development
    command:
      [
        "uvicorn",
        "code.code_optimizer_ai.api_main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--reload-dir",
        "/app",
      ]
    environment:
      DEBUG: "true"
      LOG_LEVEL: "DEBUG"
      ENABLE_API_DOCS: "true"
      FEATURE_EVOLUTIONARY_SEARCH: ${FEATURE_EVOLUTIONARY_SEARCH:-true}
      REQUIRE_AUTH_TOKEN: ${REQUIRE_AUTH_TOKEN:-false}
      FORWARDED_ALLOW_IPS: "127.0.0.1"
      ENVIRONMENT: "development"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      REDIS_URL: "redis://redis:6379/11"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${API_HOST_PORT:-8000}:8000"
    volumes:
      - ../..:/app
      - app_data:/app/data
      - app_models:/app/models
      - app_logs:/app/logs
